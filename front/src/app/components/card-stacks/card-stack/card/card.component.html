<div class="card" (click)="click()" [ngClass]="{'card-selected': login.selected}">
  <div class="card-content">
    <h2 class="card-title">{{login.decryptedData?.title ?? '*********' }}</h2>
    <div  class="card-icon-container">
      @if (!login.decryptedData) {
        <mat-icon>lock</mat-icon>
      }
      @if (!login.vaultId) {
        <button class="card-icon" mat-button [disabled]="true"><mat-icon class="card-icon">folder_off</mat-icon>Orphaned</button>
      }
    </div>
  </div>
  <div class="card-footer">
    @for (tagName of login.tagNames; track tagName; let i = $index) {
      <app-chip [label]="tagName"></app-chip>
    }
  </div>
</div>
