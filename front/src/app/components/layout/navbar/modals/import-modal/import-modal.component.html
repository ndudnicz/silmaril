<div class="modal-body">
    <h1 mat-dialog-title>Import Logins</h1>
    <mat-icon class="close-button close-dialog-button" (click)="closeDialog()">close</mat-icon>
    <mat-dialog-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <mat-form-field class="full-width" appearance="fill" floatLabel="always">
                <mat-label>Decryption password</mat-label>
                <input matInput type="password" formControlName="password"
                    placeholder="Enter password to decrypt the import file">
                <mat-hint>Required if you are importing an encrypted json file</mat-hint>
            </mat-form-field>
            <div class="file-upload-container">
                <label for="file-upload" class="mat-label">File to upload : </label>
                <input id="file-upload" type="file" hidden (change)="onFileSelected($event)" accept=".json, .csv"
                    #fileInput required />
                <button mat-stroked-button type="button" (click)="fileInput.click()">
                    Choose File
                </button>
                @if(fileName) {
                <span>{{ fileName }}</span>
                }
            </div>
            <div class="buttons">
                <button mat-raised-button type="submit" matButton [disabled]="form.invalid || loading">Import</button>
            </div>
        </form>
    </mat-dialog-content>
</div>
