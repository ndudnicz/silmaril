<div class="progress-container" [ngStyle]="{
        'height': height,
        'border-radius': borderRadius,
    }">
  <div class="progress-fill" [ngStyle]="{
    'width.%': value,
    'background-color': color,
    'height': height,
    'border-radius': borderRadius
    }">
    @if (displayValue()) {
    <span class="progress-text">{{ value() }}%</span>
    }
  </div>
</div>
