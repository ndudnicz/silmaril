<div class="relative h-full w-full">
  <a
    routerLink="/vault"
    class="absolute top-4 left-4 z-10 flex items-center gap-2 text-sm text-surface-700 hover:underline"
  >
    <i class="pi pi-arrow-left"></i>
    <span>Back</span>
  </a>

  <div class="flex h-full w-full">
    <div class="flex-1 absolute top-10 items-center w-full">
      <div class="flex items-center mx-4">
        <span id="selected-logins-counter">
          <i>({{ selected().length }} selected)</i>
        </span>
        <p-button
          variant="text"
          severity="secondary"
          icon="pi pi-undo"
          pTooltip="Clear Selection"
          tooltipPosition="bottom"
          (click)="clearSelection()"
          [disabled]="selected().length === 0"
        />
        <p-button
          variant="text"
          severity="secondary"
          icon="pi pi-file-arrow-up"
          pTooltip="Restore Selected Credentials"
          tooltipPosition="bottom"
          (click)="restoreSelectedCredentials()"
          [disabled]="selected().length === 0"
        />
        <p-button
          variant="text"
          severity="secondary"
          icon="pi pi-times-circle"
          pTooltip="Permanently Delete Selected Credentials"
          tooltipPosition="bottom"
          (click)="confirmDeleteSelectedCredentials()"
          [disabled]="selected().length === 0"
        />
      </div>
      <div class="flex h-[80vh] w-full">
        @if (displayedCredentials().length === 0 && loading === false && searchValue() === '') {
          <div id="no-data">
            <span>Empty</span>
            <br />
          </div>
        }
        @if (displayedCredentials().length === 0 && loading === false && searchValue() !== '') {
          <div id="no-data">
            <span>No results found</span>
            <br />
          </div>
        }
        @if (displayedCredentials().length > 0) {
          <app-card-stacks
            class="w-full"
            (clickEvent)="select($event)"
            [displayedCredentials]="displayedCredentials()"
          ></app-card-stacks>
        }
      </div>
    </div>
  </div>
</div>
