<strong class="text-sm">This is <u>not</u> your master password</strong>
<form [formGroup]="form" (ngSubmit)="onSubmit()" (keypress)="keypress($event)">
  <p-iconfield class="mt-2">
    <input
      class="w-full"
      type="password"
      pInputText
      placeholder="Old password"
      formControlName="oldPassword"
      required
    />
    <p-inputicon class="pi pi-lock" />
  </p-iconfield>

  <p-iconfield class="mt-2">
    <input
      class="w-full"
      type="password"
      pInputText
      placeholder="New password"
      formControlName="newPassword"
      required
      on-focusout="inputFocusOut()"
    />
    <p-inputicon class="pi pi-lock" />
  </p-iconfield>

  <p-iconfield class="mt-2">
    <input
      class="w-full"
      type="password"
      pInputText
      placeholder="Confirm new password"
      formControlName="confirmNewPassword"
      required
    />
    <p-inputicon class="pi pi-lock" />
  </p-iconfield>

  <div class="flex justify-end mt-4">
    <p-button
      variant="text"
      severity="secondary"
      label="Cancel"
      type="submit"
      (onClick)="closeDialog(); $event.preventDefault()"
    />
    <p-button
      variant="text"
      severity="secondary"
      label="Change Password"
      type="submit"
      [disabled]="form.invalid || loading"
    />
  </div>
</form>
