<div class="flex items-center justify-center h-full w-full">
  <div class="flex-1 m-auto max-w-80 h-80">
    <h1 class="text-2xl font-bold">Sign up</h1>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" (keypress)="keypress($event)">
      <p-iconfield class="mt-2">
        <input
          class="w-full"
          type="text"
          pInputText
          placeholder="Username"
          formControlName="username"
          required
        />
        <p-inputicon class="pi pi-user" />
      </p-iconfield>

      <p-iconfield class="mt-2">
        <input
          class="w-full"
          type="password"
          pInputText
          placeholder="Password"
          formControlName="password"
          required
        />
        <p-inputicon class="pi pi-lock" />
      </p-iconfield>

      <p-iconfield class="mt-2">
        <input
          class="w-full"
          type="password"
          pInputText
          placeholder="Confirm Password"
          formControlName="confirmPassword"
          required
        />
        <p-inputicon class="pi pi-lock" />
      </p-iconfield>

      <div class="w-full flex justify-end items-center">
        <a class="mr-1" routerLink="/signin" class="text-[#007bff]">Sign in</a>
        <p-button
          variant="text"
          severity="secondary"
          label="Sign up"
          type="submit"
          [disabled]="
            usernameFormControl.invalid ||
            passwordFormControl.invalid ||
            confirmPasswordFormControl.invalid ||
            loading
          "
        />
      </div>
    </form>

    @if (passwordFormControl.dirty && passwordFormControl.invalid) {
      <p-message severity="error">
        Password Requirements :
        <ul>
          <li>At least 8 characters</li>
          <li>At least one letter</li>
          <li>At least one digit</li>
          <li>At least one uppercase letter</li>
          <li>At least one lowercase letter</li>
          <li>At least one special character</li>
        </ul>
      </p-message>
    }
  </div>
</div>
