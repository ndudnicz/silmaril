<form [formGroup]="form" (ngSubmit)="onSubmit()" (keypress)="keypress($event)">
  <input
    type="text"
    class="w-full"
    pInputText
    placeholder="Vault Name"
    formControlName="vaultName"
    required
  />
  <div class="flex justify-end gap-2 mt-4">
    <p-button
      variant="text"
      severity="secondary"
      label="Edit"
      type="submit"
      [disabled]="form.invalid || loading"
    />
  </div>
</form>
