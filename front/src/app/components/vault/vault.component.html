<div id="vault-container">
  <div class="flex items-center">
    <div class="">
      <span>diamond icon</span>
    </div>
    <div class="flex items-center">
      <input
        pInputText
        type="text"
        [(ngModel)]="searchValue"
        [placeholder]="searchBarPlaceholder()"
        (ngModelChange)="searchValue.set($event.trim())"
        [ngModelOptions]="{ standalone: true }"
      />
    </div>
    <div class="flex-1 items-end flex justify-end gap-2">
      <p-button
        variant="text"
        severity="secondary"
        icon="pi pi-plus"
        (click)="openAddCredentialModal()"
        pTooltip="Add Credential"
        tooltipPosition="bottom"
      />
      <p-button
        variant="text"
        severity="secondary"
        icon="pi pi-cog"
        (click)="openEditVaultModal()"
        pTooltip="Edit Vault"
        tooltipPosition="bottom"
      />
      <p-button
        variant="text"
        severity="secondary"
        icon="pi pi-key"
        (click)="openChangeMasterPasswordModal()"
        pTooltip="Change Master Password"
        tooltipPosition="bottom"
      />
      <p-button
        variant="text"
        severity="secondary"
        icon="pi pi-trash"
        (click)="openDeleteVaultModal()"
        pTooltip="Delete Vault"
        tooltipPosition="bottom"
      />
    </div>
  </div>

  <div id="vault-grid-container">
    <div id="stacks-container">
      @if (displayedCredentials().length === 0 && loading === false && searchValue() === '') {
        <div id="no-data">
          <span>No data yet</span>
          <br />
          <span>Add your first credential</span>
          <br />
          <p-button
            variant="text"
            severity="secondary"
            icon="pi pi-plus"
            (click)="openAddCredentialModal()"
          />
        </div>
      }
      @if (displayedCredentials().length === 0 && loading === false && searchValue() !== '') {
        <div id="no-data">
          <span>No results found</span>
          <i class="pi pi-search"></i>
          <br />
        </div>
      }
      @if (displayedCredentials().length > 0) {
        <app-card-stacks
          class="card-stacks"
          (clickEvent)="selectedCredential.set($event)"
          [displayedCredentials]="displayedCredentials()"
        ></app-card-stacks>
      }
    </div>
    <p-drawer
      header="Drawer"
      [visible]="showDrawer()"
      [style]="{ width: '500px' }"
      position="right"
      [modal]="true"
      [closable]="true"
      (onHide)="selectedCredential.set(null)"
      closable="true"
    >
      <app-selected-credential
        class="w-full"
        [(credential)]="selectedCredential"
        (updateCredential)="onCredentialUpdated($event)"
      ></app-selected-credential>
    </p-drawer>
  </div>
</div>
