<!-- <div id="flex"> -->
<div class="flex items-center h-[8vh] w-full">
  <div class="">
    <p-menu
      #menu
      [popup]="true"
      [model]="menuItems()"
      class="flex justify-center"
      styleClass="w-full md:w-60"
    >
      <ng-template #start>
        <span class="inline-flex items-center gap-1 px-2 py-2">
          <span class="text-xl font-semibold">💎 Silmaril</span>
        </span>
      </ng-template>
      <ng-template #submenuheader let-item>
        <span class="text-primary font-bold">{{ item.label }}</span>
      </ng-template>
      <ng-template #end>
        <div class="flex-col items-center justify-center">
          <div class="flex-1 flex p-2">
            <img class="w-6 mr-2" src="assets/images/github.svg" alt="github logo" />
            <a href="https://github.com/ndudnicz/silmaril" target="_blank"> Github </a>
          </div>
        </div>
      </ng-template>
    </p-menu>
    <p-button severity="secondary" variant="text" (click)="menu.toggle($event)" icon="pi pi-bars" />
  </div>
  <div class="flex items-center">
    <input
      pInputText
      type="text"
      [(ngModel)]="searchValue"
      [placeholder]="searchBarPlaceholder()"
      (ngModelChange)="searchValue.set($event.trim())"
      [ngModelOptions]="{ standalone: true }"
    />
  </div>
  <div class="flex-1 items-end flex justify-end gap-2">
    <p-button
      variant="text"
      severity="secondary"
      icon="pi pi-plus"
      (click)="openAddCredentialModal()"
      pTooltip="Add credential"
      tooltipPosition="bottom"
    />
    <p-button
      variant="text"
      severity="secondary"
      icon="pi pi-cog"
      (click)="openEditVaultModal()"
      pTooltip="Edit vault"
      tooltipPosition="bottom"
    />
    <p-button
      variant="text"
      severity="secondary"
      icon="pi pi-key"
      (click)="openChangeMasterPasswordModal()"
      pTooltip="Change master password"
      tooltipPosition="bottom"
    />
    <p-button
      variant="text"
      severity="secondary"
      icon="pi pi-trash"
      (click)="openDeleteVaultModal()"
      pTooltip="Delete vault"
      tooltipPosition="bottom"
    />
  </div>
</div>

@if (displayedCredentials().length === 0 && loading === false && searchValue() === '') {
  <div class="flex items-center justify-center h-[92vh] w-full">
    <div class="flex-col justify-center items-center">
      <div class="flex-col justify-center items-center">
        <p class="flex-1 text-center">No data yet</p>
        <p class="flex-1 text-center">Add your first credential</p>
      </div>
      <div class="flex-1 w-full items-center flex justify-center">
        <p-button
          variant="text"
          severity="secondary"
          icon="pi pi-plus"
          (click)="openAddCredentialModal()"
        />
      </div>
    </div>
  </div>
} @else if (displayedCredentials().length === 0 && loading === false && searchValue() !== '') {
  <div class="flex items-center justify-center h-[92vh] w-full">
    <div class="flex-col justify-center items-center">
      <div class="flex-col justify-center items-center">
        <p class="flex-1 text-center">No results found</p>
      </div>
      <div class="flex-1 w-full items-center flex justify-center">
        <i class="pi pi-search"></i>
      </div>
    </div>
  </div>
} @else {
  <div class="flex h-[92vh] w-full">
    <app-card-stacks
      class="w-full"
      (clickEvent)="selectedCredential.set($event)"
      [displayedCredentials]="displayedCredentials()"
    ></app-card-stacks>
    <p-drawer
      header="Credential"
      [visible]="showDrawer()"
      [style]="{ width: '500px' }"
      position="right"
      [modal]="true"
      [closable]="true"
      (onHide)="selectedCredential.set(null)"
      closable="true"
    >
      <app-selected-credential
        class="w-full"
        [(credential)]="selectedCredential"
        (updateCredential)="onCredentialUpdated($event)"
      ></app-selected-credential>
    </p-drawer>
  </div>
}
